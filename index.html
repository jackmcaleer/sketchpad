<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="btn">

        <button class="reset">Reset</button>
        <button>Grid Size</button>

    </div>

    <div class="container"> </div>
    
    


    <script>

        const container = document.querySelector(".container");

        const cellPercentage = 100 / 16;

        for(let i = 0; i < 256; i++) {
            const box = document.createElement("div");
            box.classList.add("gridBox");

            box.style.width = `${cellPercentage}%`;
            box.style.height = `${cellPercentage}%`;

             container.appendChild(box);
             
        }

        const boxColor = document.querySelector(".container");

        boxColor.addEventListener('mouseover', (e) => {
        
            if (e.target.classList.contains('gridBox') && !(e.shiftKey)) {

                e.target.style.backgroundColor = 'black';
            }

        });

        const resetBtn = document.querySelector('.reset');

        resetBtn.addEventListener('click', () => {
            window.location.reload();
        })


    </script>
</body>


</html>
